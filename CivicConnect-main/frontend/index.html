<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    
    if (!token) {
      window.location.href = 'landing.html';
    } else if (role === 'admin') {
      window.location.href = 'admin/dashboard.html';
    } else {
      window.location.href = 'citizen/dashboard.html';
    }
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
