<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - Civic Connect</title>
  <link rel="stylesheet" href="../styles.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .streak-badge { background: #fff7ed; border: 1px solid #fdba74; padding: 1.5rem; border-radius: 1rem; display: flex; align-items: center; gap: 1rem; }
    .level-badge-large { width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.25rem; color: white; margin-bottom: 1rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    .Bronze { background: radial-gradient(circle, #b45309, #78350f); }
    .Silver { background: radial-gradient(circle, #94a3b8, #475569); }
    .Gold { background: radial-gradient(circle, #f59e0b, #b45309); }
    .Diamond { background: radial-gradient(circle, #3b82f6, #1d4ed8); }
    .point-card { background: white; padding: 1rem; border-radius: 0.75rem; border-left: 4px solid var(--primary); display: flex; justify-content: space-between; margin-bottom: 0.75rem; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function ProfilePage() {
      const [profile, setProfile] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const fetchProfile = async () => {
          try {
            const token = localStorage.getItem('token');
            const response = await fetch('http://localhost:8000/citizen/profile', {
              headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
              const data = await response.json();
              setProfile(data);
            }
          } catch (err) {
            console.error(err);
          } finally {
            setLoading(false);
          }
        };
        fetchProfile();
      }, []);

      if (loading) return <div className="container">Loading Profile...</div>;

      const nextLevelPoints = profile.points < 100 ? 100 : profile.points < 300 ? 300 : profile.points < 600 ? 600 : 0;
      const progress = nextLevelPoints ? (profile.points / nextLevelPoints) * 100 : 100;

      return (
        <div>
           <header>
            <div className="logo" onClick={() => window.location.href='dashboard.html'} style={{ cursor: 'pointer' }}>
               <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
               Civic Connect
            </div>
            <nav style={{ display: 'flex', gap: '1.5rem', alignItems: 'center' }}>
              <a href="dashboard.html" style={{ color: 'var(--text-light)', textDecoration: 'none' }}>Dashboard</a>
              <a href="profile.html" style={{ fontWeight: '600', color: 'var(--primary)', textDecoration: 'none' }}>Profile</a>
              <a href="rewards.html" style={{ color: 'var(--text-light)', textDecoration: 'none' }}>Rewards</a>
              <a href="vouchers.html" style={{ color: 'var(--text-light)', textDecoration: 'none' }}>Vouchers</a>
            </nav>
          </header>

          <main className="container animate-fade">
             <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '2rem', marginBottom: '3rem' }}>
                <div className="card" style={{ background: 'white', display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center' }}>
                    <div className={`level-badge-large ${profile.level}`}>{profile.level}</div>
                    <h2>{profile.name}</h2>
                    <p style={{ color: 'var(--text-light)' }}>{profile.level} Level Citizen</p>
                    
                    <div style={{ width: '100%', marginTop: '1.5rem' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.8rem', marginBottom: '0.4rem' }}>
                            <span>{profile.points} Points</span>
                            {nextLevelPoints > 0 && <span>{nextLevelPoints} to next level</span>}
                        </div>
                        <div style={{ height: '10px', background: '#e2e8f0', borderRadius: '5px', overflow: 'hidden' }}>
                            <div style={{ width: `${progress}%`, height: '100%', background: 'var(--primary)', transition: 'width 1s' }}></div>
                        </div>
                    </div>
                </div>

                <div className="streak-badge card">
                    <div style={{ background: '#ffedd5', padding: '1.25rem', borderRadius: '50%' }}>
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ea580c" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.5 4 6.5 2 2 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.204 1.1-3 .467.467.9 1.1 1.4 1.5Z"></path></svg>
                    </div>
                    <div>
                        <h1 style={{ fontSize: '2.5rem', lineHeight: '1', color: '#ea580c' }}>{profile.streak_days}</h1>
                        <p style={{ fontWeight: 'bold' }}>Day Streak!</p>
                        <p style={{ fontSize: '0.8rem', color: '#9a3412' }}>Keep reporting to earn bonuses.</p>
                    </div>
                </div>
             </div>

             <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr', gap: '2rem' }}>
                <div>
                    <h3>Point History</h3>
                    <div style={{ marginTop: '1rem' }}>
                        {profile.point_history && profile.point_history.map(log => (
                            <div key={log.id} className="point-card animate-fade">
                                <div>
                                    <div style={{ fontWeight: 'bold' }}>{log.action}</div>
                                    <div style={{ fontSize: '0.75rem', color: 'var(--text-light)' }}>{new Date(log.timestamp).toLocaleString()}</div>
                                </div>
                                <div style={{ color: 'var(--success)', fontWeight: 'bold' }}>+{log.points_earned} PTS</div>
                            </div>
                        ))}
                    </div>
                </div>

                <div className="card" style={{ background: 'white' }}>
                    <h3>Did you know?</h3>
                    <p style={{ margin: '1rem 0', color: 'var(--text-light)', fontSize: '0.9rem' }}>
                        Reporting issues consistently keeps our city safe and earns you massive bonuses! 
                        <br/><br/>
                        A 7-day streak gives you <b>50 extra points</b>, and a 30-day streak awards a massive <b>200 points</b>.
                    </p>
                    <a href="rewards.html" className="btn btn-outline" style={{ width: '100%' }}>Go to Rewards Store</a>
                </div>
             </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ProfilePage />);
  </script>
</body>
</html>
