<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rewards Store - Civic Connect</title>
  <link rel="stylesheet" href="../styles.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function RewardsStore() {
      const [profile, setProfile] = useState(null);
      const [redeeming, setRedeeming] = useState(null);

      const fetchProfile = async () => {
        try {
          const token = localStorage.getItem('token');
          const response = await fetch('http://localhost:8000/citizen/profile', {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (response.ok) {
            const data = await response.json();
            setProfile(data);
          }
        } catch (err) {
          console.error(err);
        }
      };

      useEffect(() => {
        fetchProfile();
      }, []);

      const handleRedeem = async (rewardId) => {
        setRedeeming(rewardId);
        try {
          const token = localStorage.getItem('token');
          const response = await fetch(`http://localhost:8000/rewards/redeem/${rewardId}`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` }
          });
          
          if (response.ok) {
            const data = await response.json();
            alert('Success: ' + data.message);
            fetchProfile(); // Refresh points
          } else {
            const err = await response.json();
            alert('Wait: ' + err.detail);
          }
        } catch (err) {
          alert('Error connecting to server');
        } finally {
          setRedeeming(null);
        }
      };

      if (!profile) return <div className="container">Loading rewards...</div>;

      const items = [
        { id: 1, title: 'Priority Boost', cost: 50, level: 'Bronze', desc: 'Set your most recent complaint to high priority for faster resolution.' },
        { id: 2, title: '1-Day Bus Pass', cost: 150, level: 'Silver', desc: 'Unlock a free digital bus pass valid for 24 hours city-wide.' },
        { id: 3, title: '7-Day Bus Pass', cost: 500, level: 'Gold', desc: 'The ultimate reward: Unlimited bus travel for a full week.' }
      ];

      return (
        <div>
           <header>
            <div className="logo" onClick={() => window.location.href='dashboard.html'} style={{ cursor: 'pointer' }}>
               <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
               Civic Connect
            </div>
            <div style={{ display: 'flex', gap: '1.5rem', alignItems: 'center' }}>
                <div style={{ background: '#dbeafe', color: 'var(--primary)', padding: '0.5rem 1rem', borderRadius: '0.5rem', fontWeight: 'bold' }}>
                    {profile.points} Points Available
                </div>
            </div>
          </header>

          <main className="container animate-fade">
            <div style={{ marginBottom: '3rem', textAlign: 'center' }}>
                <h1>Rewards Store</h1>
                <p style={{ color: 'var(--text-light)' }}>Redeem your hard-earned points for exclusive benefits.</p>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '2rem' }}>
                {items.map(item => {
                    const levelMet = (item.level === 'Bronze') || 
                                     (item.level === 'Silver' && ['Silver', 'Gold', 'Diamond'].includes(profile.level)) ||
                                     (item.level === 'Gold' && ['Gold', 'Diamond'].includes(profile.level));
                    const pointsMet = profile.points >= item.cost;
                    const canRedeem = levelMet && pointsMet;

                    return (
                        <div key={item.id} className="card animate-fade" style={{ background: 'white', display: 'flex', flexDirection: 'column' }}>
                            <div style={{ flex: 1 }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '1rem' }}>
                                    <span style={{ color: 'var(--primary)', fontWeight: 'bold' }}>{item.cost} PTS</span>
                                    <span className="status-badge status-pending" style={{ opacity: levelMet ? 1 : 0.5 }}>{item.level}+ Level</span>
                                </div>
                                <h2>{item.title}</h2>
                                <p style={{ color: 'var(--text-light)', margin: '1rem 0' }}>{item.desc}</p>
                            </div>
                            <button 
                                onClick={() => handleRedeem(item.id)} 
                                disabled={!canRedeem || redeeming === item.id}
                                className={`btn ${canRedeem ? 'btn-primary' : 'btn-outline'}`}
                                style={{ width: '100%', marginTop: 'auto', opacity: canRedeem ? 1 : 0.5, cursor: canRedeem ? 'pointer' : 'not-allowed' }}
                            >
                                {redeeming === item.id ? 'Processing...' : canRedeem ? 'Redeem Now' : !levelMet ? 'Level Too Low' : 'Not Enough Points'}
                            </button>
                        </div>
                    );
                })}
            </div>
            <div style={{ marginTop: '3rem', textAlign: 'center' }}>
                <a href="vouchers.html" className="btn btn-outline">View My Vouchers</a>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RewardsStore />);
  </script>
</body>
</html>
