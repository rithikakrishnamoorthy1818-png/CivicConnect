<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Civic Connect</title>
    <link rel="stylesheet" href="../styles.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* Admin Dashboard Specific Styles */
        .hero-section {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            padding: 3rem 2rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .hero-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 1.25rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
            position: relative;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .stat-icon {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
        }

        .icon-total {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        .icon-resolved {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
        }

        .icon-workers {
            background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
        }

        .icon-breached {
            background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
        }

        .stat-info {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            color: var(--text-light);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 2.25rem;
            font-weight: 800;
            line-height: 1.1;
            color: var(--text);
        }

        .table-container {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filters select,
        .filters input {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            outline: none;
            background: #f8fafc;
            font-family: inherit;
            transition: all 0.2s;
        }

        .filters select:focus,
        .filters input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .filters input {
            flex-grow: 1;
            min-width: 250px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 1rem;
        }

        th,
        td {
            padding: 1.25rem 1rem;
            text-align: left;
        }

        th {
            background: #f8fafc;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            border-bottom: 2px solid #e2e8f0;
        }

        th:first-child {
            border-top-left-radius: 0.5rem;
            border-bottom-left-radius: 0.5rem;
        }

        th:last-child {
            border-top-right-radius: 0.5rem;
            border-bottom-right-radius: 0.5rem;
        }

        tbody tr {
            transition: background-color 0.2s;
            border-bottom: 1px solid #f1f5f9;
        }

        tbody tr:hover {
            background: #f8fafc;
            cursor: pointer;
        }

        tbody td {
            border-bottom: 1px solid #f1f5f9;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        .badge-critical {
            background: #fee2e2;
            color: #b91c1c;
        }

        .badge-high {
            background: #ffedd5;
            color: #c2410c;
        }

        .badge-medium {
            background: #e0f2fe;
            color: #0369a1;
        }

        .badge-boosted {
            background: linear-gradient(to right, #fcd34d, #f59e0b);
            color: #78350f;
            box-shadow: 0 2px 4px rgba(245, 158, 11, 0.2);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function AdminNavbar() {
            return (
                <header style={{ borderBottom: '1px solid #e2e8f0', boxShadow: 'none' }}>
                    <div className="logo" style={{ color: '#1e40af' }}>
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        Civic Authority Dashboard
                    </div>
                    <nav style={{ display: 'flex', gap: '2rem', alignItems: 'center' }}>
                        <a href="dashboard.html" style={{ fontWeight: '700', color: '#1e40af', textDecoration: 'none', borderBottom: '2px solid #1e40af', paddingBottom: '0.25rem' }}>Complaints</a>
                        <a href="map.html" style={{ color: 'var(--text-light)', textDecoration: 'none', fontWeight: '500' }}>Live Map</a>
                        <a href="workers.html" style={{ color: 'var(--text-light)', textDecoration: 'none', fontWeight: '500' }}>Workers</a>
                        <a href="analytics.html" style={{ color: 'var(--text-light)', textDecoration: 'none', fontWeight: '500' }}>Analytics</a>
                        <button onClick={() => { localStorage.clear(); window.location.href = 'login.html'; }} className="btn btn-outline" style={{ border: '2px solid #e2e8f0', color: '#64748b', padding: '0.5rem 1rem' }}>Logout</button>
                    </nav>
                </header>
            );
        }

        function AdminDashboard() {
            const [complaints, setComplaints] = useState([]);
            const [stats, setStats] = useState({ total: 0, resolved: 0, active_workers: 0, breached: 0 });
            const [filterStatus, setFilterStatus] = useState('');
            const [filterCategory, setFilterCategory] = useState('');
            const [searchTerm, setSearchTerm] = useState('');
            const [loading, setLoading] = useState(true);

            const fetchData = async () => {
                const token = localStorage.getItem('token');
                if (!token) {
                    window.location.href = 'login.html';
                    return;
                }
                try {
                    const resC = await fetch('http://localhost:8000/complaints', { headers: { 'Authorization': `Bearer ${token}` } });
                    if (resC.status === 401) {
                        localStorage.clear();
                        window.location.href = 'login.html';
                        return;
                    }
                    const resA = await fetch('http://localhost:8000/admin/analytics', { headers: { 'Authorization': `Bearer ${token}` } });
                    if (resC.ok && resA.ok) {
                        setComplaints(await resC.json());
                        const aData = await resA.json();
                        setStats(aData.stats);
                    }
                } catch (err) { console.error(err); }
                finally { setLoading(false); }
            };

            useEffect(() => { fetchData(); }, []);

            const filtered = complaints.filter(c => {
                return (filterStatus === '' || c.status === filterStatus) &&
                    (filterCategory === '' || c.category === filterCategory) &&
                    (searchTerm === '' || c.id.toString().includes(searchTerm) || c.description.toLowerCase().includes(searchTerm.toLowerCase()));
            });

            return (
                <div style={{ background: '#f8fafc', minHeight: '100vh', paddingBottom: '4rem' }}>
                    <AdminNavbar />

                    <div className="hero-section container">
                        <h1 className="hero-title">City Operations Center</h1>
                        <p className="hero-subtitle">Monitor, manage, and resolve civic issues across the metropolis in real-time.</p>
                    </div>

                    <main className="container animate-fade" style={{ paddingTop: '0' }}>
                        <div className="stat-grid">
                            <div className="stat-card">
                                <div className="stat-icon icon-total">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                                </div>
                                <div className="stat-info">
                                    <span className="stat-label">Total Issues</span>
                                    <span className="stat-value">{stats.total}</span>
                                </div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-icon icon-resolved">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                                </div>
                                <div className="stat-info">
                                    <span className="stat-label">Resolved</span>
                                    <span className="stat-value">{stats.resolved}</span>
                                </div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-icon icon-workers">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                                </div>
                                <div className="stat-info">
                                    <span className="stat-label">Active Field Workers</span>
                                    <span className="stat-value">{stats.active_workers}</span>
                                </div>
                            </div>
                            <div className="stat-card" style={{ border: stats.breached > 0 ? '1px solid #fecaca' : 'none' }}>
                                <div className="stat-icon icon-breached">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                                </div>
                                <div className="stat-info">
                                    <span className="stat-label">SLA Breached</span>
                                    <span className="stat-value" style={{ color: stats.breached > 0 ? '#ef4444' : 'inherit' }}>{stats.breached}</span>
                                </div>
                            </div>
                        </div>

                        <div className="table-container">
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem', flexWrap: 'wrap', gap: '1rem' }}>
                                <h2 style={{ fontSize: '1.5rem', fontWeight: '800', color: '#1e293b', margin: 0 }}>Active Complaints HQ</h2>
                                <div className="filters" style={{ margin: 0 }}>
                                    <input type="text" placeholder="Search ID, keyword, citizen..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                    <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)}>
                                        <option value="">All Statuses</option>
                                        <option value="Pending">Pending</option>
                                        <option value="In-Progress">In-Progress</option>
                                        <option value="Resolved">Resolved</option>
                                    </select>
                                    <select value={filterCategory} onChange={(e) => setFilterCategory(e.target.value)}>
                                        <option value="">All Categories</option>
                                        <option value="Pothole">Pothole</option>
                                        <option value="Garbage">Garbage</option>
                                        <option value="Street Light">Street Light</option>
                                        <option value="Water Leakage">Water Leakage</option>
                                        <option value="Road Damage">Road Damage</option>
                                    </select>
                                </div>
                            </div>

                            {loading ? (
                                <div style={{ textAlign: 'center', padding: '3rem', color: 'var(--text-light)' }}>
                                    <svg className="animate-spin" style={{ margin: '0 auto 1rem auto', animation: 'spin 1s linear infinite' }} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
                                    Loading live data...
                                    <style>{`@keyframes spin { 100% { transform: rotate(360deg); } }`}</style>
                                </div>
                            ) : (
                                <div style={{ overflowX: 'auto' }}>
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Ticket ID</th>
                                                <th>Category</th>
                                                <th>Severity</th>
                                                <th>Status</th>
                                                <th>Engagement</th>
                                                <th>Date Reported</th>
                                                <th>Action</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {filtered.map(c => (
                                                <tr key={c.id} onClick={() => window.location.href = `complaint.html?id=${c.id}`}>
                                                    <td style={{ fontWeight: '600', color: '#64748b' }}>#{c.id}</td>
                                                    <td>
                                                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', fontWeight: '500' }}>
                                                            {c.category}
                                                            {c.priority_boosted && <span className="badge badge-boosted"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> Priority</span>}
                                                        </div>
                                                    </td>
                                                    <td>
                                                        <span className={`badge badge-${c.severity === 'Critical' ? 'critical' : c.severity === 'High' ? 'high' : 'medium'}`}>
                                                            {c.severity}
                                                        </span>
                                                    </td>
                                                    <td>
                                                        <span className={`status-badge ${c.status === 'Pending' ? 'status-pending' : c.status === 'In-Progress' ? 'status-progress' : 'status-resolved'}`}>
                                                            {c.status}
                                                        </span>
                                                    </td>
                                                    <td>
                                                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.25rem', color: '#64748b' }}>
                                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>
                                                            {c.upvotes}
                                                        </div>
                                                    </td>
                                                    <td style={{ color: '#64748b' }}>{new Date(c.created_at).toLocaleDateString()}</td>
                                                    <td>
                                                        <button className="btn btn-primary" style={{ padding: '0.4rem 0.75rem', fontSize: '0.8rem', borderRadius: '6px' }}>
                                                            Manage
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                            {filtered.length === 0 && (
                                                <tr>
                                                    <td colSpan="7" style={{ textAlign: 'center', padding: '3rem', color: '#94a3b8' }}>No complaints found matching your criteria.</td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminDashboard />);
    </script>
</body>

</html>
