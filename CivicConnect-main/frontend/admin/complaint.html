<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Complaint - Civic Connect</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    .stage-pill { padding: 0.5rem 1rem; border: 1px solid #e2e8f0; border-radius: 9999px; font-size: 0.75rem; color: #64748b; background: white; margin-right: 0.5rem; margin-bottom: 0.5rem; display: inline-block; }
    .stage-pill.active { background: #dbeafe; color: var(--primary); border-color: var(--primary); font-weight: bold; }
    .stage-pill.completed { background: #dcfce7; color: var(--success); border-color: var(--success); }
    #mini-map { height: 200px; border-radius: 0.5rem; margin-top: 1rem; }
    .worker-card { border: 1px solid #e2e8f0; padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 0.5rem; cursor: pointer; transition: all 0.2s; }
    .worker-card:hover { border-color: var(--primary); background: #f8fafc; }
    .worker-card.selected { border-width: 2px; border-color: var(--primary); background: #eff6ff; }
    .sla-timer { font-family: monospace; font-size: 1.25rem; font-weight: bold; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function ComplaintDetailPage() {
      const [complaint, setComplaint] = useState(null);
      const [workers, setWorkers] = useState([]);
      const [selectedWorkers, setSelectedWorkers] = useState([]);
      const [loading, setLoading] = useState(true);
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const mapRef = useRef(null);

      const stages = [
        "Received", "Verified", "Assigned", "Dispatched", "Started", "Mid-way", "Inspection", "Resolved"
      ];

      const fetchDetails = async () => {
        const token = localStorage.getItem('token');
        try {
          const res = await fetch(`http://localhost:8000/complaints/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
          const resW = await fetch(`http://localhost:8000/workers`, { headers: { 'Authorization': `Bearer ${token}` } });
          if (res.ok && resW.ok) {
            const cData = await res.json();
            setComplaint(cData);
            setWorkers(await resW.json());
            
            if (!mapRef.current) {
                setTimeout(() => {
                    mapRef.current = L.map('mini-map').setView([cData.latitude, cData.longitude], 15);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapRef.current);
                    L.marker([cData.latitude, cData.longitude]).addTo(mapRef.current);
                }, 100);
            }
          }
        } catch (err) { console.error(err); }
        finally { setLoading(false); }
      };

      useEffect(() => { if (id) fetchDetails(); }, [id]);

      const advanceStage = async () => {
          if (complaint.current_stage >= 7) return;
          const token = localStorage.getItem('token');
          try {
              const res = await fetch(`http://localhost:8000/complaints/${id}/stage?new_stage=${complaint.current_stage + 1}`, {
                  method: 'PATCH',
                  headers: { 'Authorization': `Bearer ${token}` }
              });
              if (res.ok) fetchDetails();
          } catch (err) { alert('Error updating stage'); }
      };

      const handleWorkerToggle = (wId) => {
          if (selectedWorkers.includes(wId)) {
              setSelectedWorkers(selectedWorkers.filter(id => id !== wId));
          } else {
              setSelectedWorkers([...selectedWorkers, wId]);
          }
      };

      const assignTeam = async () => {
          if (selectedWorkers.length === 0) return alert('Select at least one worker');
          const token = localStorage.getItem('token');
          try {
              const res = await fetch(`http://localhost:8000/complaints/${id}/team`, {
                  method: 'POST',
                  headers: { 
                      'Authorization': `Bearer ${token}`,
                      'Content-Type': 'application/json'
                  },
                  body: JSON.stringify(selectedWorkers)
              });
              if (res.ok) {
                  alert('Team assigned!');
                  fetchDetails();
              }
          } catch (err) { console.error(err); }
      };

      if (loading) return <div className="container">Loading Detail...</div>;
      if (!complaint) return <div className="container">Complaint not found</div>;

      const slaDeadline = new Date(complaint.sla_deadline);
      const isBreached = new Date() > slaDeadline;

      return (
        <div>
          <header>
            <div className="logo" onClick={() => window.location.href='dashboard.html'} style={{ cursor: 'pointer', color: '#d97706' }}>
               <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
               Back to List
            </div>
            <div style={{ fontWeight: 600 }}>Authority Control: Complaint #{id}</div>
          </header>

          <main className="container animate-fade" style={{ display: 'grid', gridTemplateColumns: '1.5fr 1fr', gap: '2rem' }}>
            <div>
              <div className="card" style={{ background: 'white', marginBottom: '2rem' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                    <h2>Control Panel</h2>
                    <div className="sla-timer" style={{ color: isBreached ? 'black' : 'var(--danger)' }}>
                        SLA: {isBreached ? 'BREACHED' : slaDeadline.toLocaleDateString()}
                    </div>
                </div>

                <div style={{ marginBottom: '2rem' }}>
                    <p style={{ fontWeight: 'bold', marginBottom: '0.5rem', fontSize: '0.8rem' }}>CURRENT WORKFLOW PROGRESS</p>
                    <div style={{ display: 'flex', flexWrap: 'wrap' }}>
                        {stages.map((s, idx) => (
                            <span key={idx} className={`stage-pill ${idx === complaint.current_stage ? 'active' : ''} ${idx < complaint.current_stage ? 'completed' : ''}`}>
                                {idx < complaint.current_stage ? '✓ ' : ''}{idx}. {s}
                            </span>
                        ))}
                    </div>
                </div>

                {complaint.current_stage < 7 && (
                   <button onClick={advanceStage} className="btn btn-primary" style={{ width: '100%', padding: '1rem', background: '#d97706' }}>
                       Advance to Stage {complaint.current_stage + 1}: {stages[complaint.current_stage + 1]}
                   </button>
                )}
                {complaint.current_stage === 7 && <div className="status-badge status-resolved" style={{ textAlign: 'center', padding: '1rem', display: 'block' }}>RESOLUTION COMPLETED</div>}
              </div>

              <div className="card" style={{ background: 'white' }}>
                 <h3>Team Assignment</h3>
                 <p style={{ fontSize: '0.8rem', color: 'var(--text-light)', marginBottom: '1rem' }}>Assign a team lead (first selected) and workers.</p>
                 <div style={{ maxHeight: '400px', overflowY: 'auto' }}>
                    {workers.map(w => (
                        <div 
                            key={w.id} 
                            className={`worker-card ${selectedWorkers.includes(w.id) ? 'selected' : ''}`}
                            onClick={() => handleWorkerToggle(w.id)}
                        >
                            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                <strong>{w.name}</strong>
                                <span style={{ fontSize: '0.7rem', color: w.status === 'free' ? 'var(--success)' : 'var(--danger)' }}>{w.status.toUpperCase()}</span>
                            </div>
                            <div style={{ fontSize: '0.8rem', color: 'var(--text-light)' }}>Dept: {w.department} | Active Jobs: {w.active_job_count}</div>
                        </div>
                    ))}
                 </div>
                 <button onClick={assignTeam} className="btn btn-primary" style={{ width: '100%', marginTop: '1rem' }}>Update Assigned Team</button>
              </div>
            </div>

            <div>
              <div className="card" style={{ background: 'white', position: 'sticky', top: '2rem' }}>
                  <img src={complaint.photo_url} style={{ width: '100%', borderRadius: '0.5rem' }} />
                  <div style={{ marginTop: '1rem' }}>
                     <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <h4 style={{ margin: '0' }}>{complaint.category}</h4>
                        <span style={{ fontSize: '0.8rem', background: '#fee2e2', color: '#991b1b', padding: '0.2rem 0.5rem', borderRadius: '4px' }}>{complaint.severity}</span>
                     </div>
                     <p style={{ fontSize: '0.9rem', color: 'var(--text-light)', marginTop: '0.5rem' }}>{complaint.description}</p>
                  </div>
                  
                  {complaint.ai_detected && (
                     <div style={{ background: '#f0f9ff', padding: '0.75rem', borderRadius: '0.5rem', border: '1px solid #bae6fd', fontSize: '0.8rem', marginTop: '1rem' }}>
                        <strong>AI Analysis:</strong> {complaint.ai_confidence}% confidence in {complaint.category} category.
                     </div>
                  )}

                  <div id="mini-map"></div>
                  
                  <div style={{ marginTop: '1.5rem', fontSize: '0.8rem' }}>
                     <strong>Reported by:</strong> Citizen #{complaint.citizen_id}<br/>
                     <strong>Upvotes:</strong> {complaint.upvotes}
                  </div>
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ComplaintDetailPage />);
  </script>
</body>
</html>
