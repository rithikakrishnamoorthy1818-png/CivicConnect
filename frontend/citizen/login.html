<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citizen Login - Civic Connect</title>
  <link rel="stylesheet" href="../styles.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function LoginPage() {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');

        const formData = new FormData();
        formData.append('email', email);
        formData.append('password', password);

        try {
          const response = await fetch('http://localhost:8000/citizen/login', {
            method: 'POST',
            body: formData
          });

          if (response.ok) {
            const data = await response.json();
            localStorage.setItem('token', data.access_token);
            localStorage.setItem('role', 'citizen');
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = 'dashboard.html';
          } else {
            const errData = await response.json();
            setError(errData.detail || 'Login failed');
          }
        } catch (err) {
          setError('Could not connect to server');
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="container" style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', minHeight: '90vh' }}>
          <div className="card animate-fade" style={{ width: '100%', maxWidth: '400px', background: 'white' }}>
            <div className="logo" style={{ justifyContent: 'center', marginBottom: '2rem' }}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
              Civic Connect
            </div>
            
            <h2 style={{ textAlign: 'center', marginBottom: '1.5rem' }}>Citizen Login</h2>

            {error && <div style={{ background: '#fee2e2', color: '#991b1b', padding: '0.75rem', borderRadius: '0.5rem', marginBottom: '1.5rem', fontSize: '0.875rem' }}>{error}</div>}

            <form onSubmit={handleSubmit}>
              <div className="input-group">
                <label>Email Address</label>
                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required placeholder="you@example.com" />
              </div>

              <div className="input-group">
                <label>Password</label>
                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required placeholder="••••••••" />
              </div>

              <button type="submit" className="btn btn-primary" style={{ width: '100%', marginBottom: '1rem' }} disabled={loading}>
                {loading ? 'Logging in...' : 'Login'}
              </button>

              <div style={{ textAlign: 'center', fontSize: '0.875rem', color: 'var(--text-light)' }}>
                Don't have an account? <a href="register.html" style={{ color: 'var(--primary)', fontWeight: '600' }}>Register</a>
              </div>
            </form>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LoginPage />);
  </script>
</body>
</html>
