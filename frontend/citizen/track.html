<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Complaint - Civic Connect</title>
  <link rel="stylesheet" href="../styles.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .pipeline { display: flex; flex-direction: column; gap: 1rem; position: relative; padding-left: 2rem; }
    .pipeline::before { content: ''; position: absolute; left: 7px; top: 0; bottom: 0; width: 2px; background: #e2e8f0; }
    .stage { position: relative; padding: 0.5rem 0; }
    .stage-dot { position: absolute; left: -2rem; top: 12px; width: 16px; height: 16px; border-radius: 50%; background: #cbd5e1; border: 3px solid white; z-index: 1; transition: all 0.3s; }
    .stage.active .stage-dot { background: var(--primary); transform: scale(1.2); box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.2); }
    .stage.completed .stage-dot { background: var(--success); }
    .stage.completed .stage-title { color: var(--success); font-weight: bold; }
    .stage.active .stage-title { color: var(--primary); font-weight: bold; }
    .stage-time { font-size: 0.75rem; color: var(--text-light); }
    .eta-container { background: #f8fafc; padding: 1rem; border-radius: 0.5rem; border: 1px solid #e2e8f0; margin-bottom: 2rem; }
    .progress-bar { height: 8px; background: #e2e8f0; border-radius: 4px; margin-top: 0.5rem; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); transition: width 1s ease-in-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function TrackerPage() {
      const [complaint, setComplaint] = useState(null);
      const [loading, setLoading] = useState(true);
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      const stages = [
        "Complaint Received",
        "Verified by Authority",
        "Team Assembled",
        "Team Dispatched",
        "Work Started",
        "Work Halfway Done",
        "Final Inspection",
        "Issue Resolved"
      ];

      useEffect(() => {
        const fetchComplaint = async () => {
          try {
            const token = localStorage.getItem('token');
            const response = await fetch(`http://localhost:8000/complaints/${id}`, {
              headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
              const data = await response.json();
              setComplaint(data);
            }
          } catch (err) {
            console.error(err);
          } finally {
            setLoading(false);
          }
        };
        if (id) fetchComplaint();
      }, [id]);

      if (!id) return <div className="container">Invalid Complaint ID</div>;
      if (loading) return <div className="container">Loading Tracking Info...</div>;
      if (!complaint) return <div className="container">Complaint not found</div>;

      const progress = (complaint.current_stage / 7) * 100;

      return (
        <div>
          <header>
            <div className="logo" onClick={() => window.location.href='dashboard.html'} style={{ cursor: 'pointer' }}>
               <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
               Back to Dashboard
            </div>
            <div style={{ fontWeight: 600 }}>Tracking Complaint #{id}</div>
          </header>

          <main className="container animate-fade" style={{ maxWidth: '900px', display: 'grid', gridTemplateColumns: '1.5fr 1fr', gap: '2rem' }}>
            <div>
              <div className="eta-container">
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.5rem' }}>
                  <span style={{ fontWeight: 600 }}>Resolution Progress</span>
                  <span style={{ color: 'var(--primary)', fontWeight: 'bold' }}>{Math.round(progress)}% Complete</span>
                </div>
                <div className="progress-bar">
                  <div className="progress-fill" style={{ width: `${progress}%` }}></div>
                </div>
                <div style={{ marginTop: '1rem', fontSize: '0.875rem', color: 'var(--text-light)', display: 'flex', justifyContent: 'space-between' }}>
                  <span>SLA Deadline: {new Date(complaint.sla_deadline).toLocaleDateString()}</span>
                  <span>Status: {complaint.status}</span>
                </div>
              </div>

              <h3>Live Pipeline</h3>
              <div className="pipeline card" style={{ background: 'white', marginTop: '1rem' }}>
                {stages.map((s, idx) => {
                  const isCompleted = idx < complaint.current_stage;
                  const isActive = idx === complaint.current_stage;
                  const timestamp = complaint.stage_timestamps ? complaint.stage_timestamps[idx.toString()] : null;
                  
                  return (
                    <div key={idx} className={`stage ${isCompleted ? 'completed' : ''} ${isActive ? 'active' : ''}`}>
                      <div className="stage-dot"></div>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <span className="stage-title">{s}</span>
                        {timestamp && <span className="stage-time">{new Date(timestamp).toLocaleString([], {hour: '2-digit', minute:'2-digit', day: '2-digit', month: 'short'})}</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div>
               <div className="card" style={{ background: 'white', padding: '1.5rem' }}>
                    <img src={complaint.photo_url || 'https://via.placeholder.com/400x200?text=No+Photo'} style={{ width: '100%', borderRadius: '0.5rem', marginBottom: '1rem' }} />
                    <h4 style={{ color: 'var(--primary)', marginBottom: '0.5rem' }}>{complaint.category}</h4>
                    <p style={{ fontSize: '0.9rem', marginBottom: '1rem' }}>{complaint.description}</p>
                    {complaint.priority_boosted && (
                        <div style={{ background: '#ecfdf5', color: '#047857', padding: '0.5rem', borderRadius: '0.5rem', fontSize: '0.8rem', fontWeight: 'bold', display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                             <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                             Priority Boosted
                        </div>
                    )}
                    <div style={{ borderTop: '1px solid #eee', marginTop: '1rem', paddingTop: '1rem', fontSize: '0.8rem', color: 'var(--text-light)' }}>
                        <p>Reported on: {new Date(complaint.created_at).toLocaleString()}</p>
                        <p>Location: {complaint.latitude.toFixed(4)}, {complaint.longitude.toFixed(4)}</p>
                    </div>
               </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TrackerPage />);
  </script>
</body>
</html>
