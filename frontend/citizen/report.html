<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Issue - Civic Connect</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    #map { height: 300px; border-radius: 0.5rem; margin-bottom: 1.5rem; }
    .ai-card { background: #f0f9ff; border: 1px dashed var(--primary); padding: 1rem; border-radius: 0.5rem; margin-top: 1rem; position: relative; }
    .confidence-bar { height: 4px; background: #e2e8f0; border-radius: 2px; margin-top: 0.5rem; width: 100%; position: relative; overflow: hidden; }
    .confidence-fill { height: 100%; background: var(--primary); transition: width 0.5s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function ReportPage() {
      const [file, setFile] = useState(null);
      const [preview, setPreview] = useState(null);
      const [loadingAI, setLoadingAI] = useState(false);
      const [aiResult, setAiResult] = useState(null);
      const [category, setCategory] = useState('');
      const [description, setDescription] = useState('');
      const [severity, setSeverity] = useState('Medium');
      const [lat, setLat] = useState(12.9716); // Default Bangalore
      const [lng, setLng] = useState(77.5946);
      const [submitting, setSubmitting] = useState(false);
      const mapRef = useRef(null);
      const markerRef = useRef(null);

      useEffect(() => {
        if (!mapRef.current) {
          mapRef.current = L.map('map').setView([lat, lng], 13);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapRef.current);
          markerRef.current = L.marker([lat, lng], { draggable: true }).addTo(mapRef.current);
          
          markerRef.current.on('dragend', () => {
            const pos = markerRef.current.getLatLng();
            setLat(pos.lat);
            setLng(pos.lng);
          });
        }
      }, []);

      const handleFileChange = async (e) => {
        const selected = e.target.files[0];
        if (!selected) return;
        setFile(selected);
        
        const reader = new FileReader();
        reader.onloadend = () => {
          setPreview(reader.result);
        };
        reader.readAsDataURL(selected);
        
        // Call AI Detection
        setLoadingAI(true);
        const formData = new FormData();
        formData.append('file', selected);

        try {
          const response = await fetch('http://localhost:8000/detect-image', {
            method: 'POST',
            body: formData
          });
          if (response.ok) {
            const result = await response.json();
            setAiResult(result);
            setCategory(result.category);
            setSeverity(result.severity);
            setDescription(result.description);
          }
        } catch (err) {
          console.error("AI Error:", err);
        } finally {
          setLoadingAI(false);
        }
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setSubmitting(true);
        const token = localStorage.getItem('token');
        const formData = new FormData();
        formData.append('category', category);
        formData.append('description', description);
        formData.append('latitude', lat);
        formData.append('longitude', lng);
        formData.append('severity', severity);
        if (aiResult) {
            formData.append('ai_detected', true);
            formData.append('ai_confidence', aiResult.confidence);
        }
        // In a real app we'd upload file to S3 and send URL. For demo, we just use the preview or a mock.
        formData.append('photo_url', preview || "");

        try {
          const response = await fetch('http://localhost:8000/complaints', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
          });
          
          if (response.status === 401) {
              localStorage.clear();
              window.location.href = 'login.html';
              return;
          }

          if (response.ok) {
            alert('Complaint submitted successfully! +25 Points Awarded.');
            window.location.href = 'dashboard.html';
          } else {
            const errData = await response.json();
            alert('Error submitting complaint: ' + (errData.detail || 'Unknown error'));
          }
        } catch (err) {
          console.error(err);
          alert('Network or server error while submitting complaint.');
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <div>
          <header>
            <div className="logo" onClick={() => window.location.href='dashboard.html'} style={{ cursor: 'pointer' }}>
               <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
               Report Issue
            </div>
            <div className="tagline">Providing citizens a smarter way to report</div>
          </header>

          <main className="container animate-fade" style={{ maxWidth: '800px' }}>
            <div className="card" style={{ background: 'white' }}>
              <form onSubmit={handleSubmit}>
                <div className="input-group">
                  <label>Upload Photo of the Issue</label>
                  <input type="file" accept="image/*" onChange={handleFileChange} style={{ border: '2px dashed #cbd5e1', padding: '2rem', textAlign: 'center' }} />
                </div>

                {preview && (
                  <div style={{ marginBottom: '1.5rem', textAlign: 'center' }}>
                    <img src={preview} alt="issue preview" style={{ maxWidth: '100%', borderRadius: '0.5rem', maxHeight: '300px' }} />
                    {loadingAI && <p style={{ color: 'var(--primary)', marginTop: '0.5rem' }}>AI is analyzing your image...</p>}
                    {aiResult && (
                      <div className="ai-card animate-fade">
                        <div style={{ fontWeight: 'bold', display: 'flex', justifyContent: 'space-between' }}>
                          <span>AI Detected: {aiResult.category}</span>
                          <span style={{ color: 'var(--primary)' }}>{aiResult.confidence}% Confidence</span>
                        </div>
                        <p style={{ fontSize: '0.8rem', color: 'var(--text-light)', marginTop: '0.5rem' }}>{aiResult.description}</p>
                        <div className="confidence-bar"><div className="confidence-fill" style={{ width: `${aiResult.confidence}%` }}></div></div>
                      </div>
                    )}
                  </div>
                )}

                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem' }}>
                    <div className="input-group">
                        <label>Category</label>
                        <select value={category} onChange={(e) => setCategory(e.target.value)} required>
                            <option value="">Select Category</option>
                            <option value="Pothole">Pothole</option>
                            <option value="Garbage">Garbage</option>
                            <option value="Street Light">Street Light</option>
                            <option value="Water Leakage">Water Leakage</option>
                            <option value="Road Damage">Road Damage</option>
                        </select>
                    </div>
                    <div className="input-group">
                        <label>Severity</label>
                        <select value={severity} onChange={(e) => setSeverity(e.target.value)} required>
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                            <option value="Critical">Critical</option>
                        </select>
                    </div>
                </div>

                <div className="input-group">
                  <label>Description</label>
                  <textarea value={description} onChange={(e) => setDescription(e.target.value)} placeholder="Provide any extra details..." rows="3" required></textarea>
                </div>

                <label style={{ display: 'block', marginBottom: '0.5rem', fontWeight: '500' }}>Confirm Location</label>
                <div id="map"></div>

                <button type="submit" className="btn btn-primary" style={{ width: '100%' }} disabled={submitting}>
                    {submitting ? 'Submitting...' : 'Submit Complaint'}
                </button>
              </form>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ReportPage />);
  </script>
</body>
</html>
