<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Workers - Civic Connect</title>
  <link rel="stylesheet" href="../styles.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .worker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 0.5rem; }
    .status-free { background: var(--success); }
    .status-busy { background: var(--warning); }
    .status-off { background: #cbd5e1; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function AdminNavbar() {
        return (
            <header>
                <div className="logo" style={{ color: '#d97706' }}>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    Civic Authority
                </div>
                <nav style={{ display: 'flex', gap: '1.5rem', alignItems: 'center' }}>
                    <a href="dashboard.html" style={{ color: 'var(--text-light)', textDecoration: 'none' }}>Complaints</a>
                    <a href="map.html" style={{ color: 'var(--text-light)', textDecoration: 'none' }}>Live Map</a>
                    <a href="workers.html" style={{ fontWeight: '600', color: '#d97706', textDecoration: 'none' }}>Workers</a>
                    <a href="analytics.html" style={{ color: 'var(--text-light)', textDecoration: 'none' }}>Analytics</a>
                </nav>
            </header>
        );
    }

    function WorkerManagement() {
      const [workers, setWorkers] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const fetchWorkers = async () => {
          const token = localStorage.getItem('token');
          try {
            const res = await fetch('http://localhost:8000/workers', { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) setWorkers(await res.json());
          } catch (e) { console.error(e); }
          finally { setLoading(false); }
        };
        fetchWorkers();
      }, []);

      return (
        <div>
          <AdminNavbar />
          <main className="container animate-fade">
             <div style={{ marginBottom: '2rem' }}>
                <h1>Field Workers</h1>
                <p style={{ color: 'var(--text-light)' }}>Monitor status and workload of the municipal response team.</p>
             </div>

             {loading ? <p>Loading workers...</p> : (
               <div className="worker-grid">
                  {workers.map(w => (
                     <div key={w.id} className="card" style={{ background: 'white' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                           <span style={{ fontWeight: 'bold', fontSize: '1.1rem' }}>{w.name}</span>
                           <div style={{ display: 'flex', alignItems: 'center' }}>
                              <span className={`status-dot status-${w.status === 'off_duty' ? 'off' : w.status}`}></span>
                              <span style={{ fontSize: '0.75rem', fontWeight: 'bold', textTransform: 'uppercase' }}>{w.status.replace('_', ' ')}</span>
                           </div>
                        </div>
                        <div style={{ fontSize: '0.9rem', color: 'var(--text-light)', borderBottom: '1px solid #eee', paddingBottom: '1rem', marginBottom: '1rem' }}>
                           <strong>Department:</strong> {w.department}<br/>
                           <strong>Phone:</strong> {w.phone}
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.8rem' }}>
                            <div>
                                <div style={{ color: 'var(--text-light)' }}>ACTIVE JOBS</div>
                                <div style={{ fontSize: '1.25rem', fontWeight: 'bold' }}>{w.active_job_count}</div>
                            </div>
                            <div style={{ textAlign: 'right' }}>
                                <div style={{ color: 'var(--text-light)' }}>AVG RESOLUTION</div>
                                <div style={{ fontSize: '1.25rem', fontWeight: 'bold' }}>{w.avg_resolution_hours}h</div>
                            </div>
                        </div>
                     </div>
                  ))}
               </div>
             )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<WorkerManagement />);
  </script>
</body>
</html>
