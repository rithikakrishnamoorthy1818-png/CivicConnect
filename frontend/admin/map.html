<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue Map - Civic Connect</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    #full-map { height: calc(100vh - 120px); border-radius: 1rem; border: 4px solid white; box-shadow: var(--shadow); }
    .leaf-popup .btn { padding: 0.2rem 0.5rem; font-size: 0.75rem; margin-top: 0.5rem; display: block; text-align: center; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useRef } = React;

    function AdminNavbar() {
        return (
            <header>
                <div className="logo" style={{ color: '#d97706' }}>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    Civic Authority
                </div>
                <nav style={{ display: 'flex', gap: '1.5rem', alignItems: 'center' }}>
                    <a href="dashboard.html" style={{ color: 'var(--text-light)', textDecoration: 'none' }}>Complaints</a>
                    <a href="map.html" style={{ fontWeight: '600', color: '#d97706', textDecoration: 'none' }}>Live Map</a>
                    <a href="workers.html" style={{ color: 'var(--text-light)', textDecoration: 'none' }}>Workers</a>
                    <a href="analytics.html" style={{ color: 'var(--text-light)', textDecoration: 'none' }}>Analytics</a>
                </nav>
            </header>
        );
    }

    function MapView() {
      const mapRef = useRef(null);
      const markersRef = useRef([]);

      useEffect(() => {
        if (!mapRef.current) {
          mapRef.current = L.map('full-map').setView([12.9716, 77.5946], 12);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapRef.current);
        }

        const fetchComplaints = async () => {
          const token = localStorage.getItem('token');
          try {
            const res = await fetch('http://localhost:8000/complaints', { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) {
              const data = await res.json();
              
              // Clear old markers
              markersRef.current.forEach(m => mapRef.current.removeLayer(m));
              markersRef.current = [];

              data.forEach(c => {
                const color = c.status === 'Resolved' ? '#10b981' : c.status === 'In-Progress' ? '#f59e0b' : '#64748b';
                
                const icon = L.divIcon({
                  className: 'custom-div-icon',
                  html: `<div style="background-color:${color}; width:15px; height:15px; border-radius:50%; border:2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.3)"></div>`,
                  iconSize: [20, 20]
                });

                const m = L.marker([c.latitude, c.longitude], { icon }).addTo(mapRef.current);
                m.bindPopup(`
                  <div class="leaf-popup">
                    <img src="${c.photo_url}" style="width:100px; height:60px; object-fit:cover; border-radius:4px" />
                    <strong>${c.category}</strong><br/>
                    Status: ${c.status}<br/>
                    <a href="complaint.html?id=${c.id}" class="btn btn-primary" style="background:#d97706; color:white">Control Panel</a>
                  </div>
                `);
                markersRef.current.push(m);
              });
            }
          } catch (e) { console.error(e); }
        };

        fetchComplaints();
      }, []);

      return (
        <div>
          <AdminNavbar />
          <main className="container animate-fade">
             <div id="full-map"></div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MapView />);
  </script>
</body>
</html>
