<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City Analytics - Civic Connect</title>
  <link rel="stylesheet" href="../styles.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .chart-container { background: white; padding: 1.5rem; border-radius: 1rem; box-shadow: var(--shadow); }
    .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    @media (max-width: 768px) { .analytics-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function AdminNavbar() {
        return (
            <header>
                <div className="logo" style={{ color: '#d97706' }}>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    Civic Authority
                </div>
                <nav style={{ display: 'flex', gap: '1.5rem', alignItems: 'center' }}>
                    <a href="dashboard.html" style={{ color: 'var(--text-light)', textDecoration: 'none' }}>Complaints</a>
                    <a href="map.html" style={{ color: 'var(--text-light)', textDecoration: 'none' }}>Live Map</a>
                    <a href="workers.html" style={{ color: 'var(--text-light)', textDecoration: 'none' }}>Workers</a>
                    <a href="analytics.html" style={{ fontWeight: '600', color: '#d97706', textDecoration: 'none' }}>Analytics</a>
                </nav>
            </header>
        );
    }

    function AnalyticsPage() {
      const [data, setData] = useState(null);
      const pieChartRef = useRef(null);
      const barChartRef = useRef(null);

      useEffect(() => {
        const fetchAnalytics = async () => {
          const token = localStorage.getItem('token');
          try {
            const res = await fetch('http://localhost:8000/admin/analytics', { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) {
              const result = await res.json();
              setData(result);
              
              // Draw Pie Chart
              new Chart(document.getElementById('catChart'), {
                  type: 'pie',
                  data: {
                      labels: Object.keys(result.category_dist),
                      datasets: [{
                          data: Object.values(result.category_dist),
                          backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6']
                      }]
                  },
                  options: { plugins: { legend: { position: 'bottom' } } }
              });

              // Draw Status Bar Chart
              new Chart(document.getElementById('statusChart'), {
                  type: 'bar',
                  data: {
                      labels: ['Total', 'Resolved', 'Breached', 'Active Workers'],
                      datasets: [{
                          label: 'Operations Count',
                          data: [result.stats.total, result.stats.resolved, result.stats.breached, result.stats.active_workers],
                          backgroundColor: '#d97706'
                      }]
                  },
                  options: { scales: { y: { beginAtZero: true } } }
              });
            }
          } catch (e) { console.error(e); }
        };
        fetchAnalytics();
      }, []);

      return (
        <div>
          <AdminNavbar />
          <main className="container animate-fade">
             <div style={{ marginBottom: '2rem' }}>
                <h1>City Performance Analytics</h1>
                <p style={{ color: 'var(--text-light)' }}>Quantitative insights into civic issue resolution efficiency.</p>
             </div>

             <div className="analytics-grid">
                <div className="chart-container">
                    <h3>Issues by Category</h3>
                    <canvas id="catChart" style={{ marginTop: '1rem' }}></canvas>
                </div>
                <div className="chart-container">
                    <h3>System Stats Overview</h3>
                    <canvas id="statusChart" style={{ marginTop: '1rem' }}></canvas>
                </div>
             </div>

             <div className="card" style={{ background: 'white', marginTop: '2rem', textAlign: 'center' }}>
                 <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '1rem' }}>
                    {data && (
                        <React.Fragment>
                            <div>
                                <div style={{ fontSize: '0.8rem', color: 'var(--text-light)' }}>Resolution Rate</div>
                                <div style={{ fontSize: '2rem', fontWeight: 'bold' }}>{Math.round((data.stats.resolved / data.stats.total || 0) * 100)}%</div>
                            </div>
                            <div>
                                <div style={{ fontSize: '0.8rem', color: 'var(--text-light)' }}>Avg Workers / Issue</div>
                                <div style={{ fontSize: '2rem', fontWeight: 'bold' }}>{(data.stats.active_workers / (data.stats.total - data.stats.resolved) || 0).toFixed(1)}</div>
                            </div>
                            <div>
                                <div style={{ fontSize: '0.8rem', color: 'var(--text-light)' }}>SLA Compliance</div>
                                <div style={{ fontSize: '2rem', fontWeight: 'bold', color: 'var(--success)' }}>{100 - Math.round((data.stats.breached / data.stats.total || 0) * 100)}%</div>
                            </div>
                            <div>
                                <div style={{ fontSize: '0.8rem', color: 'var(--text-light)' }}>Active Response Team</div>
                                <div style={{ fontSize: '2rem', fontWeight: 'bold', color: 'var(--primary)' }}>{data.stats.active_workers}</div>
                            </div>
                        </React.Fragment>
                    )}
                 </div>
             </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AnalyticsPage />);
  </script>
</body>
</html>
