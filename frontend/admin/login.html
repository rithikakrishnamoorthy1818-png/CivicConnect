<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authority Login - Civic Connect</title>
  <link rel="stylesheet" href="../styles.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function AdminLoginPage() {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');

        const formData = new FormData();
        formData.append('email', email);
        formData.append('password', password);

        try {
          const response = await fetch('http://localhost:8000/admin/login', {
            method: 'POST',
            body: formData
          });

          if (response.ok) {
            const data = await response.json();
            localStorage.setItem('token', data.access_token);
            localStorage.setItem('role', 'admin');
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = 'dashboard.html';
          } else {
            const errData = await response.json();
            setError(errData.detail || 'Login failed');
          }
        } catch (err) {
          setError('Could not connect to server');
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="container" style={{ display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center', minHeight: '90vh' }}>
          <div style={{ marginBottom: '2rem', textAlign: 'center' }}>
            <a href="../landing.html" style={{ color: 'var(--text-light)', textDecoration: 'none', display: 'flex', alignItems: 'center', gap: '0.5rem', justifyContent: 'center' }}>
             <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
             Back to Landing
            </a>
          </div>

          <div className="card animate-fade" style={{ width: '100%', maxWidth: '400px', background: 'white', borderTop: '4px solid #d97706' }}>
            <div className="logo" style={{ justifyContent: 'center', marginBottom: '2rem', color: '#d97706' }}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
              Civic Authority
            </div>
            
            <h2 style={{ textAlign: 'center', marginBottom: '1.5rem' }}>Authority Portal Login</h2>

            {error && <div style={{ background: '#fee2e2', color: '#991b1b', padding: '0.75rem', borderRadius: '0.5rem', marginBottom: '1.5rem', fontSize: '0.875rem' }}>{error}</div>}

            <form onSubmit={handleSubmit}>
              <div className="input-group">
                <label>Admin Email</label>
                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required placeholder="admin@civicconnect.app" />
              </div>

              <div className="input-group">
                <label>Password</label>
                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required placeholder="••••••••" />
              </div>

              <button type="submit" className="btn" style={{ width: '100%', marginBottom: '1rem', background: '#d97706', color: 'white' }} disabled={loading}>
                {loading ? 'Authenticating...' : 'Secure Login'}
              </button>

              <p style={{ textAlign: 'center', fontSize: '0.75rem', color: 'var(--text-light)', marginTop: '1rem' }}>
                Authorized Personnel Only. Unauthorized access is strictly prohibited.
              </p>
            </form>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AdminLoginPage />);
  </script>
</body>
</html>
