<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Civic Connect - Connecting Citizens to a Better City</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    function LandingPage() {
      return (
        <div className="landing-container">
          <header>
            <div className="logo">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
              Civic Connect
            </div>
            <div className="tagline">Connecting citizens to a better city</div>
          </header>

          <main className="container">
            <div style={{ textAlign: 'center', marginBottom: '4rem', marginTop: '2rem' }} className="animate-fade">
              <h1 style={{ fontSize: '3rem', marginBottom: '1rem' }}>Make Your Voice Count</h1>
              <p style={{ fontSize: '1.25rem', color: 'var(--text-light)' }}>Report issues, track progress, and earn rewards for improving your neighborhood.</p>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '2rem' }}>
              <div className="card animate-fade" style={{ background: 'white', display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center' }}>
                <div style={{ background: '#dbeafe', padding: '1.5rem', borderRadius: '50%', marginBottom: '1.5rem' }}>
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
                <h2>I'm a Citizen</h2>
                <p style={{ margin: '1rem 0 2rem', color: 'var(--text-light)' }}>Report potholes, street lights, or garbage. Earn points and redeem rewards.</p>
                <div style={{ display: 'flex', gap: '1rem', width: '100%' }}>
                    <a href="citizen/login.html" className="btn btn-primary" style={{ flex: 1 }}>Login</a>
                    <a href="citizen/register.html" className="btn btn-outline" style={{ flex: 1 }}>Register</a>
                </div>
              </div>

              <div className="card animate-fade" style={{ animationDelay: '0.2s', background: 'white', display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center' }}>
                <div style={{ background: '#fef3c7', padding: '1.5rem', borderRadius: '50%', marginBottom: '1.5rem' }}>
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#d97706" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </div>
                <h2>I'm an Authority</h2>
                <p style={{ margin: '1rem 0 2rem', color: 'var(--text-light)' }}>Manage complaints, assign teams, and monitor city performance analytics.</p>
                <a href="admin/login.html" className="btn btn-primary" style={{ width: '100%' }}>Authority Portal</a>
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LandingPage />);
  </script>
</body>
</html>
